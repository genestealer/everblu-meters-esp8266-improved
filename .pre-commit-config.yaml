# Pre-commit configuration for pre-commit.ci
# Docs: https://pre-commit.com/  |  https://pre-commit.ci/
#
# Generated output and vendored material are excluded so that hooks never
# rewrite files that are produced by tooling or copied verbatim:
#   - ESPHOME-release/   : generated by ESPHOME/prepare-component-release.* (do not edit)
#   - docs/datasheets/   : vendored datasheets / captures
ci:
  autofix_prs: true
  autoupdate_schedule: monthly
  skip:
    - markdownlint-cli2  # lint-only; does not block PRs

exclude: |
  (?x)^(
    ESPHOME-release/.*|
    docs/datasheets/.*|
    docs/.*|
    LICENSE\.md
  )$

repos:
  - repo: local
    # These hooks install the LATEST tool into an isolated env (no pinned versions
    # to maintain), mirroring ESPHome's toolchain. See ruff.toml / .yamllint and
    # ESPHOME/components/everblu_meter/.clang-format for the rules.
    hooks:
      # --- Python: ruff (mirrors ESPHome) ---
      - id: ruff-check
        name: ruff (lint, autofix)
        entry: ruff check --fix --force-exclude
        language: python
        additional_dependencies: ["ruff"]
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: ruff format --force-exclude
        language: python
        additional_dependencies: ["ruff"]
        types_or: [python, pyi]
        require_serial: true

      # --- YAML ---
      - id: yamllint
        name: yamllint
        entry: yamllint --strict
        language: python
        additional_dependencies: ["yamllint"]
        types: [yaml]

      # --- C++: ESPHome component only (uses the component .clang-format) ---
      - id: clang-format
        name: clang-format (ESPHome component)
        entry: clang-format -style=file -i
        language: python
        additional_dependencies: ["clang-format"]
        files: ^ESPHOME/components/everblu_meter/.*\.(cpp|h)$

      # --- ESPHOME-release regeneration ---
      # Keep the generated ESPHOME-release/ tree in sync with its sources.
      # Autofix hooks above (ruff, clang-format) can rewrite files under src/
      # and ESPHOME/components/everblu_meter/; without regenerating the release
      # output the "ESPHOME Sync Check" job fails. This hook re-runs the release
      # script so pre-commit.ci commits the regenerated ESPHOME-release/ output.
      # Must run after the formatting hooks (declaration order is honoured).
      - id: esphome-release-sync
        name: Regenerate ESPHOME-release
        entry: bash ESPHOME/prepare-component-release.sh
        language: system
        pass_filenames: false
        require_serial: true
        files: ^(src/|ESPHOME/components/everblu_meter/|ESPHOME/prepare-component-release\.sh)

  # --- Markdown: markdownlint-cli2 (rules in .markdownlint-cli2.yaml) ---
  # Node-based hook; pre-commit / pre-commit.ci provision Node automatically.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      # NOTE: line endings are governed by .gitattributes
      # (text=auto, *.sh eol=lf, *.ps1 eol=crlf). A mixed-line-ending hook
      # conflicts with eol=crlf for *.ps1 and causes an infinite autofix loop,
      # so it is intentionally omitted.
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
        # --unsafe validates YAML syntax without resolving custom tags
        # (ESPHome uses !secret, !include, !lambda, etc.)
        args: [--unsafe]
