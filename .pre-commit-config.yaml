# Pre-commit configuration for pre-commit.ci
# Docs: https://pre-commit.com/  |  https://pre-commit.ci/
#
# Generated output and vendored material are excluded so that hooks never
# rewrite files that are produced by tooling or copied verbatim:
#   - ESPHOME-release/   : generated by ESPHOME/prepare-component-release.* (do not edit)
#   - docs/datasheets/   : vendored datasheets / captures
ci:
  autofix_prs: true
  autoupdate_schedule: monthly

exclude: |
  (?x)^(
    ESPHOME-release/.*|
    docs/datasheets/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      # NOTE: line endings are governed by .gitattributes
      # (text=auto, *.sh eol=lf, *.ps1 eol=crlf). A mixed-line-ending hook
      # conflicts with eol=crlf for *.ps1 and causes an infinite autofix loop,
      # so it is intentionally omitted.
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
        # --unsafe validates YAML syntax without resolving custom tags
        # (ESPHome uses !secret, !include, !lambda, etc.)
        args: [--unsafe]
