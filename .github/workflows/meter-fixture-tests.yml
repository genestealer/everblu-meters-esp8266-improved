name: Meter Fixture Replay Tests

on:
  push:
    branches: [main, master]
    paths:
      - src/**
      - include/**
      - platformio.ini
      - test/fixtures/**
      - test/test_native_meter_fixtures/**
      - .github/workflows/meter-fixture-tests.yml
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main, master, develop]
    paths:
      - src/**
      - include/**
      - platformio.ini
      - test/fixtures/**
      - test/test_native_meter_fixtures/**
      - .github/workflows/meter-fixture-tests.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-fixture-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Replay Captured Meter Fixtures

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-native-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Run native fixture tests
        run: |
          pio test -e native -v
