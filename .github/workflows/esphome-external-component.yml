name: ESPHome External Component Integration

on:
  push:
    branches: [main, master, develop]
    paths:
      - ESPHOME/components/everblu_meter/**
      - .ci/esphome/everblu_meter/**
      - ESPHOME/example-*.yaml
      - ESPHOME/README.md
      - .github/workflows/esphome-external-component.yml
      - tests/esphome/**
      # Shared source: the ESPHome component compiles the src/ tree (via the
      # flattened ESPHOME-release/ bundle and component includes), so changes
      # there must trigger this job too - otherwise a shared-source change that
      # breaks only the ESPHome build (e.g. an ESPHome-only logging path) slips
      # through because the ESP8266/ESP32 build jobs compile only the MQTT firmware.
      - src/**
      - include/**
      - platformio.ini
      - ESPHOME-release/**
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - ESPHOME/components/everblu_meter/**
      - .ci/esphome/everblu_meter/**
      - ESPHOME/example-*.yaml
      - ESPHOME/README.md
      - .github/workflows/esphome-external-component.yml
      - tests/esphome/**
      # Shared source (see the push trigger above for the rationale).
      - src/**
      - include/**
      - platformio.ini
      - ESPHOME-release/**
  workflow_dispatch:

concurrency:
  group: esphome-external-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-test-pr:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimal baseline - ESP8266 water meter with GDO2 hardware path
          - id: esp8266-ard
            config: .ci/esphome/everblu_meter/test.esp8266-ard.yaml
          # Full coverage - every sensor, button, and non-default option on ESP8266
          - id: esp8266-full
            config: .ci/esphome/everblu_meter/test.esp8266-full.yaml
          # Legacy GDO2 opt-out path - disable_gdo2_fifo_management: true
          - id: esp8266-legacy-gdo2
            config: .ci/esphome/everblu_meter/test.esp8266-legacy-gdo2.yaml
          # Local twin of the git smoke test - validates the standalone git
          # fixture's exact config shape against the PR's own component (no
          # network). Catches a missed fixture update during a breaking change
          # before merge - the git job itself is post-merge only.
          - id: esp8266-git-local
            config: .ci/esphome/everblu_meter/test.esp8266-git-local.yaml

    name: ${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('.github/workflows/esphome-external-component.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-esphome-${{ matrix.id }}-${{ hashFiles('.github/workflows/esphome-external-component.yml') }}
          restore-keys: |
            ${{ runner.os }}-pio-esphome-${{ matrix.id }}-
            ${{ runner.os }}-pio-esphome-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome>=2025.0"

      - name: Validate configuration
        run: esphome config ${{ matrix.config }}

      - name: Compile
        run: esphome compile ${{ matrix.config }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## ESPHome Integration Test: ${{ matrix.id }}"
            echo ""
            echo "Config: \`${{ matrix.config }}\`"
            echo ""
            echo "Validated with: \`esphome config\` + \`esphome compile\`"
          } >> "$GITHUB_STEP_SUMMARY"

  integration-test-full:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # CI scope rationale:
          # - Minimal baseline on every architecture family
          # - Full sensor/option coverage on ESP8266 (all paths exercised)
          # - Gas meter path on ESP32 (different meter_type codegen)
          # - Legacy GDO2 opt-out on ESP8266 (disable_gdo2_fifo_management: true)
          # - RISC-V architecture on ESP32-C3
          # - Git external_components smoke test (real-world install, main branch only)

          # Xtensa / Arduino - water meter, minimal
          - id: esp8266-ard
            config: .ci/esphome/everblu_meter/test.esp8266-ard.yaml
          # Xtensa / Arduino - all sensors, all options, all buttons
          - id: esp8266-full
            config: .ci/esphome/everblu_meter/test.esp8266-full.yaml
          # Xtensa / Arduino - legacy GDO2 polling (disable_gdo2_fifo_management: true)
          - id: esp8266-legacy-gdo2
            config: .ci/esphome/everblu_meter/test.esp8266-legacy-gdo2.yaml
          # Xtensa / Arduino - gas meter on ESP32
          - id: esp32-ard
            config: .ci/esphome/everblu_meter/test.esp32-ard.yaml
          # RISC-V / Arduino - different architecture family
          - id: esp32-c3-ard
            config: .ci/esphome/everblu_meter/test.esp32-c3-ard.yaml
          # Local twin of the git smoke test - same config shape via type: local
          - id: esp8266-git-local
            config: .ci/esphome/everblu_meter/test.esp8266-git-local.yaml
          # Git external_components smoke test - validates real-world install path.
          # Branch-aware: ref follows the pushed branch (github.ref_name) so a
          # push to develop validates develop's ESPHOME-release, not main.
          - id: esp8266-git
            config: .ci/esphome/everblu_meter/test.esp8266-git.yaml

    name: ${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('.github/workflows/esphome-external-component.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-esphome-${{ matrix.id }}-${{ hashFiles('.github/workflows/esphome-external-component.yml') }}
          restore-keys: |
            ${{ runner.os }}-pio-esphome-${{ matrix.id }}-
            ${{ runner.os }}-pio-esphome-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome>=2025.0"

      - name: Validate configuration
        env:
          # Only the git smoke test takes a ref override; it follows the pushed branch.
          # NOTE: -s/--substitution is a GLOBAL ESPHome option and must precede the
          # subcommand; placed after it, the override is silently ignored.
          REF_ARG: ${{ matrix.id == 'esp8266-git' && format('-s git_ref {0}', github.ref_name) || '' }}
        run: esphome $REF_ARG config ${{ matrix.config }}

      - name: Compile
        env:
          REF_ARG: ${{ matrix.id == 'esp8266-git' && format('-s git_ref {0}', github.ref_name) || '' }}
        run: esphome $REF_ARG compile ${{ matrix.config }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## ESPHome Integration Test: ${{ matrix.id }}"
            echo ""
            echo "Config: \`${{ matrix.config }}\`"
            echo ""
            echo "Validated with: \`esphome config\` + \`esphome compile\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Negative validation: assert that intentionally-invalid configs are REJECTED
  # by the component's config validators (validate_esp32_framework, validate_pins,
  # validate_gdo2_required, validate_reading_schedule, validate_meter_code).
  # These fixtures must never compile - the test passes when `esphome config`
  # exits non-zero AND prints the expected error substring.
  negative-validation:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: invalid-esp32-idf
            config: .ci/esphome/everblu_meter/test.invalid-esp32-idf.yaml
            expect: "requires ESP32 Arduino framework"
          - id: invalid-gdo2-both
            config: .ci/esphome/everblu_meter/test.invalid-gdo2-both.yaml
            expect: "mutually exclusive"
          - id: invalid-pins-conflict
            config: .ci/esphome/everblu_meter/test.invalid-pins-conflict.yaml
            expect: "must be different GPIOs"
          - id: invalid-schedule
            config: .ci/esphome/everblu_meter/test.invalid-schedule.yaml
            expect: "Invalid reading_schedule"
          - id: invalid-meter-code
            config: .ci/esphome/everblu_meter/test.invalid-meter-code.yaml
            expect: "year section must be exactly 2 digits"

    name: ${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('.github/workflows/esphome-external-component.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome>=2025.0"

      - name: Assert configuration is rejected
        run: |
          set +e
          OUTPUT=$(esphome config "${{ matrix.config }}" 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            echo "::error::Expected 'esphome config ${{ matrix.config }}' to FAIL but it passed."
            exit 1
          fi
          if ! printf '%s' "$OUTPUT" | grep -qF "${{ matrix.expect }}"; then
            echo "::error::Config failed but the expected error substring was not found: ${{ matrix.expect }}"
            exit 1
          fi
          echo "OK: rejected as expected (exit $STATUS) with: ${{ matrix.expect }}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Negative Validation: ${{ matrix.id }}"
            echo ""
            echo "Config: \`${{ matrix.config }}\`"
            echo ""
            echo "Expected rejection substring: \`${{ matrix.expect }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Python unit tests for the component's config validators. These run the
  # validators directly (no ESPHome compile) so failures are precise and fast.
  python-unit-tests:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('.github/workflows/esphome-external-component.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "esphome>=2025.0" pytest

      - name: Run validator unit tests
        run: python -m pytest tests/esphome -v
