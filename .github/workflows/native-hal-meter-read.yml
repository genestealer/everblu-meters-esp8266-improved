name: Native HAL Meter Read Simulation

# Runs the full end-to-end standalone (MQTT-path) meter read on the host: the
# real src/core radio + RADIAN protocol firmware is driven through a complete
# get_meter_data_for_meter() request/response cycle against a simulated CC1101
# chip mocked at the SPI/GPIO seam. No hardware required.
#
# See test/test_native_hal_meter_read/ and env:native_hal in platformio.ini.

on:
  push:
    branches: [main, master, develop]
    paths:
      - src/**
      - include/**
      - platformio.ini
      - test/fixtures/**
      - test/test_native_hal_meter_read/**
      - test/native_hal_shim/**
      - .github/workflows/native-hal-meter-read.yml
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - src/**
      - include/**
      - platformio.ini
      - test/fixtures/**
      - test/test_native_hal_meter_read/**
      - test/native_hal_shim/**
      - .github/workflows/native-hal-meter-read.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-hal-meter-read:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Simulate Full Meter Read (Native HAL)

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-native-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Run native full-HAL meter read simulation
        run: |
          pio test -e native_hal -v
