# NEGATIVE test: gdo0_pin and gdo2_pin must be different GPIOs.
# validate_pins() must reject the same pin on both CC1101 status outputs.
# Expected error substring: "must be different GPIOs"
# This file is intentionally invalid - do NOT add it to the compile matrix.
esphome:
  name: ci-invalid-pins-conflict
  min_version: 2024.6.0

esp8266:
  board: d1_mini
  framework:
    version: recommended

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: CI-WIFI
  password: CI-PASSWORD

spi:
  id: ci_spi
  clk_pin: GPIO14
  miso_pin: GPIO12
  mosi_pin: GPIO13

time:
  - platform: sntp
    id: ci_time

external_components:
  - source:
      type: local
      path: ../../../ESPHOME-release
    components: [ everblu_meter ]

everblu_meter:
  spi_id: ci_spi
  cs_pin: GPIO15
  meter_code: "22-8765432-100"
  gdo0_pin: GPIO4
  gdo2_pin: GPIO4
  time_id: ci_time
  volume:
    name: "CI Volume"
