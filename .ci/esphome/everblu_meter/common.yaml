# Minimal shared configuration — just enough to compile the component.
# Tests: required params, GDO2 hardware path, water meter defaults.
# Included by test.*.yaml platform files via <<: !include common.yaml
#
# For full sensor/option coverage see common-full.yaml.
# For the GDO2 legacy-polled path see test.*-legacy-gdo2.yaml.

spi:
  id: ci_spi
  clk_pin: ${spi_clk_pin}
  miso_pin: ${spi_miso_pin}
  mosi_pin: ${spi_mosi_pin}

time:
  - platform: sntp
    id: ci_time

external_components:
  - source:
      type: local
      path: ../../../ESPHOME-release
    components: [ everblu_meter ]

everblu_meter:
  spi_id: ci_spi
  cs_pin: ${cs_pin}
  meter_code: "22-8765432-100"
  meter_type: ${meter_type}
  gdo0_pin: ${gdo0_pin}
  gdo2_pin: ${gdo2_pin}
  time_id: ci_time

  volume:
    name: "CI Volume"

  status:
    name: "CI Status"
