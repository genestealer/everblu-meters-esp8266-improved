; ============================================================================
; PlatformIO Project Configuration File
; ============================================================================
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Documentation: https://docs.platformio.org/page/projectconf.html
;
; Board References:
;   ESP8266: https://docs.platformio.org/en/stable/boards/index.html#espressif-8266
;   ESP32:   https://docs.platformio.org/en/stable/boards/index.html#espressif-32
;
; Usage:
;   - Select environment via default_envs below or PlatformIO status bar
;   - Use *-ota environments for Over-The-Air updates (set device IP first)
;   - Use regular environments for USB/Serial uploads
;
; ============================================================================

[platformio]
default_envs = huzzah

; ============================================================================
; Base Configuration (shared by all environments)
; ============================================================================
[env:base]
framework = arduino
lib_deps =
    plapointe6/EspMQTTClient
    ArduinoOTA
monitor_speed = 115200
upload_speed = 460800
; Use the "direct" monitor filter so raw bytes (including ANSI colour escape
; sequences emitted by the firmware logger) are passed through unchanged to the
; terminal. The default filter rewrites control characters into printable
; Unicode glyphs (e.g. ESC -> the "␛" symbol), which prevents colour rendering.
monitor_filters = direct
test_ignore = test_native_meter_fixtures
; Exclude src/tools/ (host-only dev tools) from all firmware builds so the
; standalone main() functions in that directory don't conflict with the
; Arduino framework entry point.
build_src_filter = +<**> -<tools/>

; ============================================================================
; ESP8266 Environments
; ============================================================================

; ----------------------------------------------------------------------------
; Adafruit HUZZAH ESP8266
; https://docs.platformio.org/en/stable/boards/espressif8266/huzzah.html
; ----------------------------------------------------------------------------
[env:huzzah]
extends = env:base
platform = espressif8266
board = huzzah

[env:huzzah-ota]
extends = env:huzzah
upload_protocol = espota
upload_port = 192.168.2.21  ; Set your device IP here
monitor_port = socket://192.168.2.21:23
extra_scripts = post:scripts/monitor_delay.py
custom_monitor_connect_delay = 30

; ----------------------------------------------------------------------------
; WeMos D1 Mini Pro
; https://docs.platformio.org/en/stable/boards/espressif8266/d1_mini_pro.html
; ----------------------------------------------------------------------------
[env:d1_mini_pro]
extends = env:base
platform = espressif8266
board = d1_mini_pro

[env:d1_mini_pro-ota]
extends = env:d1_mini_pro
upload_protocol = espota
upload_port = 192.168.2.22  ; Set your device IP here
monitor_port = socket://192.168.2.22:23
extra_scripts = post:scripts/monitor_delay.py
custom_monitor_connect_delay = 30

; ----------------------------------------------------------------------------
; WeMos D1 Mini (non-Pro)
; https://docs.platformio.org/en/stable/boards/espressif8266/d1_mini.html
; ----------------------------------------------------------------------------
[env:d1_mini]
extends = env:base
platform = espressif8266
board = d1_mini

[env:d1_mini-ota]
extends = env:d1_mini
upload_protocol = espota
upload_port = 192.168.2.23  ; Set your device IP here
monitor_port = socket://192.168.2.23:23
extra_scripts = post:scripts/monitor_delay.py
custom_monitor_connect_delay = 30

; ----------------------------------------------------------------------------
; NodeMCU v2 (ESP-12E)
; https://docs.platformio.org/en/stable/boards/espressif8266/nodemcuv2.html
; ----------------------------------------------------------------------------
[env:nodemcuv2]
extends = env:base
platform = espressif8266
board = nodemcuv2

[env:nodemcuv2-ota]
extends = env:nodemcuv2
upload_protocol = espota
upload_port = 192.168.2.23  ; Set your device IP here
monitor_port = socket://192.168.2.23:23
extra_scripts = post:scripts/monitor_delay.py
custom_monitor_connect_delay = 30

; ============================================================================
; ESP32 Environments
; ============================================================================

; ----------------------------------------------------------------------------
; ESP32 DevKit
; https://docs.platformio.org/en/stable/boards/espressif32/esp32dev.html
; ----------------------------------------------------------------------------
[env:esp32dev]
extends = env:base
platform = espressif32
board = esp32dev

; ----------------------------------------------------------------------------
; ESP32-C3 DevKitM-1
; https://docs.platformio.org/en/stable/boards/espressif32/esp32-c3-devkitm-1.html
; ----------------------------------------------------------------------------
[env:esp32-c3-ard]
extends = env:base
platform = espressif32
board = esp32-c3-devkitm-1

[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.2.50  ; Set your device IP here
monitor_port = socket://192.168.2.50:23
extra_scripts = post:scripts/monitor_delay.py
custom_monitor_connect_delay = 30

; ============================================================================
; Native Test Environment (host/CI, no hardware)
; ============================================================================
[env:native]
platform = native
test_framework = unity
test_build_src = yes
test_filter = test_native_meter_fixtures
build_src_filter =
    +<core/crc_kermit.cpp>
    +<core/radian_parser.cpp>
build_flags =
    -Isrc
    -std=gnu++17
    --coverage
    -lgcov
build_unflags =
    -O2

; ============================================================================
; Hex Frame Decoder — Native Development Tool
; ============================================================================
; Interactive host program for decoding RADIAN hex frame dumps from the serial
; log.  Run with:  pio run -e hex_decoder && .pio/build/hex_decoder/program
;
; The tool accepts hex bytes pasted from [D][everblu_meter] log lines and
; attempts two strategies:
;   1. Direct parse  (bytes are already-decoded frame data, as logged during
;      a frequency scan when g_echo_debug_quiet suppresses echo_debug output
;      but LOG_D calls in show_in_hex_one_line still emit).
;   2. 4× oversampled decode  (raw CC1101 FIFO bytes captured at 9.6 kbps).
; ============================================================================
[env:hex_decoder]
platform = native
build_src_filter =
    +<core/crc_kermit.cpp>
    +<core/radian_parser.cpp>
    +<core/radian_decoder.cpp>
    +<tools/hex_decoder.cpp>
build_flags =
    -Isrc
    -std=gnu++17
