# Configuration for markdownlint-cli2 (run via pre-commit / pre-commit.ci).
# Rule reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
#
# Generated output and vendored material are excluded here (and in
# .pre-commit-config.yaml) so the linter never flags files it shouldn't:
#   - ESPHOME-release/   : generated by ESPHOME/prepare-component-release.* (do not edit)
#   - docs/datasheets/   : vendored datasheets / captures

config:
  default: true

  # Long lines are common in prose, tables, and badge blocks; hard-wrapping
  # them hurts readability and diffs.
  MD013: false

  # Docs intentionally use inline HTML (<details>, <summary>, <br>) for
  # collapsible sections and in-cell line breaks.
  MD033: false

  # Standalone bold lines are used as lead-ins (e.g. "**Supports both ...**"),
  # not as substitute headings.
  MD036: false

  # CHANGELOG.md repeats the same headings (Added / Changed / Fixed) under
  # different version sections; only flag duplicates with the same parent.
  MD024:
    siblings_only: true

globs:
  - "**/*.md"

ignores:
  - "ESPHOME-release/**"
  - "docs/datasheets/**"
